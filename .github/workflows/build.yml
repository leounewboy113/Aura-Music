name: Build AURA Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip Snack export
        run: |
          if [ -f aura.zip ]; then
            unzip aura.zip -d extracted
            if [ -d extracted ]; then
              cp -r extracted/*/ . 2>/dev/null || cp -r extracted/* . 2>/dev/null || true
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Get build URL
        run: echo "Build started! Check https://expo.dev/accounts/leou/projects/aura-music/builds"
